<!DOCTYPE html>
<html lang="bg" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Споразумения</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/events-test.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>
<div class="main-container">
    <div class="table-container">
        <div class="agreements-header">
            <h2><i class="fas fa-file-contract"></i> Списък на споразуменията</h2>
        </div>
        <div class="search-container" th:unless="${#lists.isEmpty(agreements)}">
            <label for="searchInput" style="display: none;">Търсене</label>
            <input type="text" id="searchInput" placeholder="Търсене по име или статус...">
        </div>
        <div th:if="${#lists.isEmpty(agreements)}" class="no-events">
            <i class="fas fa-folder-open"></i>
            <p>Няма налични споразумения</p>
        </div>
        <table th:unless="${#lists.isEmpty(agreements)}">
            <thead>
            <tr>
                <th scope="col">Име</th>
                <th scope="col">Статус</th>
                <th scope="col">Дата на създаване</th>
                <th scope="col">Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="agreement : ${agreements}">
                <td data-label="Име" th:text="${agreement.title}">Име на споразумение</td>
                <td data-label="Статус" th:text="${agreement.active} ? 'Активно' : 'Неактивно'">Статус</td>
                <td data-label="Дата на създаване" th:text="${#temporals.format(agreement.createdAt,'dd-MM-yyyy')}">01-01-2026</td>
                <td class="actions">
                    <button th:attr="onclick=|location.href='/agreements/details/' + '${agreement.id}'|">Детайли</button>
                    <form th:if="${!agreement.active}" th:action="@{'/agreements/publish/' + ${agreement.id}}" method="post" style="display:inline;">
                        <button type="submit">Активирай</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    document.getElementById('searchInput')?.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase().trim();
        const rows = document.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const title = row.querySelector('td[data-label="Име"]')?.textContent.toLowerCase() || '';
            const status = row.querySelector('td[data-label="Статус"]')?.textContent.toLowerCase() || '';
            if (title.includes(searchTerm) || status.includes(searchTerm)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
