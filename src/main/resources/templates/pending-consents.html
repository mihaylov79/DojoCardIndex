<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чакащи съгласия</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/consents-admin.css}">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>
<div class="main-container">
    <div class="card">
        <h2>Чакащи съгласия</h2>
        <table class="user-table">
            <thead>
                <tr>
                    <th>Потребител</th>
                    <th>Agreement</th>
                    <th>Причина</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="consent : ${pendingConsents}">
                    <td th:text="${consent.user.email}"></td>
                    <td th:text="${consent.agreement.title}"></td>
                    <td th:text="${consent.pendingReason}"></td>
                    <td th:text="${consent.finished ? 'Приключено' : 'Чакащо'}"></td>
                </tr>
            </tbody>
        </table>
        <div class="actions">
            <a href="/consent/admin/blocked" class="btn-secondary">Виж блокирани съгласия</a>
        </div>
    </div>
</div>
</body>
</html>
