
<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чакащи съгласия</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/events-test.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>
<div class="main-container">
    <div class="table-container">
        <div class="events-header">
            <h2><i class="fas fa-hourglass-half"></i> Чакащи съгласия</h2>
        </div>
        <div class="search-container" th:unless="${#lists.isEmpty(pendingConsents)}">
            <label for="searchInput" style="display: none;">Търсене</label>
            <input type="text" id="searchInput" placeholder="Търсене по email, споразумение, причина, статус...">
        </div>
        <div th:if="${#lists.isEmpty(pendingConsents)}" class="no-events">
            <i class="fas fa-folder-open"></i>
            <p>Няма налични чакащи съгласия</p>
        </div>
        <table th:unless="${#lists.isEmpty(pendingConsents)}">
            <thead>
                <tr>
                    <th>Потребител</th>
                    <th>Споразумение</th>
                    <th>Причина</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="consent : ${pendingConsents}">
                    <td data-label="Потребител" th:text="${consent.user.email}"></td>
                    <td data-label="Споразумение" th:text="${consent.agreement.title}"></td>
                    <td data-label="Причина" th:text="${consent.pendingReason}"></td>
                    <td data-label="Статус" th:text="${consent.finished ? 'Приключено' : 'Чакащо'}"></td>
                </tr>
            </tbody>
        </table>
        <div class="actions">
            <a href="/consent/admin/blocked" class="btn-secondary">Виж блокирани съгласия</a>
        </div>
    </div>
</div>
<script>
    document.getElementById('searchInput')?.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase().trim();
        const rows = document.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const email = row.querySelector('td[data-label="Потребител"]')?.textContent.toLowerCase() || '';
            const agreement = row.querySelector('td[data-label="Споразумение"]')?.textContent.toLowerCase() || '';
            const reason = row.querySelector('td[data-label="Причина"]')?.textContent.toLowerCase() || '';
            const status = row.querySelector('td[data-label="Статус"]')?.textContent.toLowerCase() || '';
            if (
                email.includes(searchTerm) ||
                agreement.includes(searchTerm) ||
                reason.includes(searchTerm) ||
                status.includes(searchTerm)
            ) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
