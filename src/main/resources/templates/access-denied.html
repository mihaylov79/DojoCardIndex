<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dojo - Достъпът е отказан</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/error-test.css}">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>

<div class="main-container">

    <div class="additional-info">
        <div class="message">
            <h1>⛔ Достъпът е отказан!</h1>
            <hr class="line"/>
            <h3 th:text="${errorMessage}"></h3>
            <hr class="line"/>

            <h3 class="reasons">Причина:</h3>
            <ul class="error-list">
                <li>Нямате необходимите права за достъп до този ресурс.</li>
                <li>Администраторските права са задължителни за това действие.</li>
                <li>Свържете се с администратора, ако мислите, че това е грешка.</li>
            </ul>

        </div>

        <p>Ако мислите, че това е грешка, <a href="/contact">свържете се с нас</a>.</p>

        <div class="button-group">
            <button class="btn-primary" onclick="history.back();">← Върни се назад</button>
            <a href="/home" class="btn-secondary">Към профилната страница</a>
        </div>
    </div>

</div>
</body>
</html>
