<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документи - Dragon Dojo</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/documents.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>

<div class="main-container">
    <div class="table-container">
        <!-- Заглавие и бутон за качване -->
        <div class="documents-header">
            <h2><i class="fas fa-file-alt"></i> Документи на клуба</h2>
            <div th:if="${currentUser != null && currentUser.role.name() == 'ADMIN'}">
                <a th:href="@{/documents/upload}" class="btn-upload">
                    <i class="fas fa-upload"></i> Качи документ
                </a>
            </div>
        </div>

        <!-- Филтри по категория -->
        <div class="filters-container">
            <form th:action="@{/documents}" method="get" class="filter-form">
                <label for="category">Категория:</label>
                <select id="category" name="category" onchange="this.form.submit()">
                    <option value="">Всички</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat.description}"
                            th:selected="${category != null && category == cat}">
                    </option>
                </select>
            </form>
        </div>

        <!-- Съобщения -->
        <span th:if="${message}" th:text="${message}" class="alert alert-success"></span>
        <span th:if="${error}" th:text="${error}" class="alert alert-error"></span>

        <!-- Няма документи -->
        <div th:if="${#lists.isEmpty(documents)}" class="no-documents">
            <i class="fas fa-folder-open"></i>
            <p>Няма налични документи</p>
        </div>

        <!-- Table с документи -->
        <table th:unless="${#lists.isEmpty(documents)}" class="documents-table">
            <thead>
            <tr>
                <th scope="col">Икона</th>
                <th scope="col">Документ</th>
                <th scope="col">Файл</th>
                <th scope="col">Описание</th>
                <th scope="col">Категория</th>
                <th scope="col">Качено</th>
                <th scope="col">Обновен</th>
                <th scope="col">Размер</th>
                <th scope="col">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doc : ${documents}">
                <!-- Икона -->
                <td data-label="Икона" class="document-icon">
                    <i class="fas fa-file-pdf" th:if="${doc.fileType == 'application/pdf'}"></i>
                    <i class="fas fa-file-word" th:if="${doc.fileType == 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || doc.fileType == 'application/msword'}"></i>
                    <i class="fas fa-file-excel" th:if="${doc.fileType == 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' || doc.fileType == 'application/vnd.ms-excel'}"></i>
                    <i class="fas fa-file-alt" th:if="${doc.fileType == 'text/plain'}"></i>
                    <i class="fas fa-file" th:unless="${doc.fileType == 'application/pdf' || doc.fileType == 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || doc.fileType == 'application/msword' || doc.fileType == 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' || doc.fileType == 'application/vnd.ms-excel' || doc.fileType == 'text/plain'}"></i>
                </td>

                <!-- Документ (само заглавие) -->
                <td data-label="Документ">
                    <span class="document-title" th:text="${doc.name}">Заглавие</span>
                </td>

                <!-- Име на файла -->
                <td data-label="Файл">
                    <span class="file-name" th:text="${doc.fileName}">Име на файл</span>
                </td>

                <!-- Описание -->
                <td data-label="Описание">
                    <span th:text="${doc.description}">Описание</span>
                </td>

                <!-- Категория -->
                <td data-label="Категория">
                    <span th:text="${doc.category.description}">Категория</span>
                </td>

                <!-- Дата на качване -->
                <td data-label="Качено">
                    <span th:text="${#temporals.format(doc.uploadedAt, 'dd.MM.yyyy')}">Дата</span>
                </td>

                <!-- Дата на обновяване -->
                <td data-label="Обновен">
                    <span th:if="${doc.updatedAt != null}" th:text="${#temporals.format(doc.updatedAt, 'dd.MM.yyyy')}">-</span>
                    <span th:if="${doc.updatedAt == null}">-</span>
                </td>

                <!-- Размер -->
                <td data-label="Размер">
                    <span th:text="${doc.fileSize < 1024 * 1024 ?
                        T(java.lang.String).format('%.0f KB', doc.fileSize / 1024.0) :
                        T(java.lang.String).format('%.2f MB', doc.fileSize / (1024.0 * 1024.0))}">Размер</span>
                </td>

                <!-- Действия -->
                <td data-label="Действия" class="document-actions">
                    <!-- Бутон за изтегляне - за всички -->
                    <a th:href="${doc.fileUrl}"
                       th:attr="data-filename=${doc.fileName}"
                       class="btn-download"
                       title="Изтегли"
                       onclick="return downloadWithCorrectName(event, this);">
                        <i class="fas fa-download"></i>
                    </a>

                    <!-- Бутони за админи -->
                    <div th:if="${currentUser != null && currentUser.role.name() == 'ADMIN'}" class="admin-actions">
                        <!-- Бутон за замяна на файл -->
                        <button type="button"
                                class="btn-replace"
                                title="Замени файл"
                                th:attr="data-document-id=${doc.id}, data-document-name=${doc.name}"
                                onclick="showReplaceModal(this.getAttribute('data-document-id'), this.getAttribute('data-document-name'))">
                            <i class="fas fa-sync-alt"></i>
                        </button>

                        <!-- Бутон за изтриване -->
                        <form th:action="@{/documents/delete/{id}(id=${doc.id})}" method="post"
                              onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този документ?');"
                              style="display: inline; margin: 0;">
                            <button type="submit" class="btn-delete" title="Изтрий">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal за замяна на файл -->
<div id="replaceModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="modal-close" onclick="closeReplaceModal()">&times;</span>
        <h3><i class="fas fa-sync-alt"></i> Замени файл</h3>
        <p>Документ: <strong id="modalDocumentName"></strong></p>

        <form id="replaceForm" method="post" enctype="multipart/form-data">
            <!-- CSRF Token за Spring Security -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="replaceFile">Изберете нов файл:</label>
                <input type="file"
                       id="replaceFile"
                       name="file"
                       required
                       accept=".pdf,.doc,.docx,.xls,.xlsx,.txt"
                       onchange="updateFileNameDisplay(this)">
                <div id="selectedFileName" class="selected-file-info" style="display: none;">
                    <i class="fas fa-file"></i>
                    <span id="fileNameText"></span>
                    <span id="fileSizeText"></span>
                </div>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-modal-submit">
                    <i class="fas fa-check"></i> Замени
                </button>
                <button type="button" class="btn-modal-cancel" onclick="closeReplaceModal()">
                    <i class="fas fa-times"></i> Отказ
                </button>
            </div>
        </form>
    </div>
</div>

<script>
/**
 * Прост JavaScript който преименува файла при download
 * Работи със Cloudinary URLs които нямат разширение или имат грешно име
 */
function downloadWithCorrectName(event, link) {
    event.preventDefault();

    const url = link.href;
    const fileName = link.getAttribute('data-filename');

    // Fetch-ваме файла и го записваме с правилното име
    fetch(url)
        .then(response => {
            if (!response.ok) {
                alert('Файлът не може да бъде изтеглен. Моля опитайте отново или се свържете с администратор.');
                return;
            }
            return response.blob();
        })
        .then(blob => {
            if (!blob) return;

            // Създаваме download link с правилното име
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = fileName; // Задаваме оригиналното име с разширение
            document.body.appendChild(a);
            a.click();

            // Cleanup
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);
        })
        .catch(error => {
            console.error('Грешка при download:', error);
            alert('Грешка при изтегляне на файла. Моля опитайте отново.');
        });

    return false;
}

/**
 * Показва избрания файл в modal-а
 */
function updateFileNameDisplay(input) {
    const fileInfo = document.getElementById('selectedFileName');
    const fileNameText = document.getElementById('fileNameText');
    const fileSizeText = document.getElementById('fileSizeText');

    if (input.files && input.files[0]) {
        const file = input.files[0];
        const fileName = file.name;
        const fileSize = (file.size / 1024).toFixed(2); // KB

        fileNameText.textContent = fileName;
        fileSizeText.textContent = `(${fileSize} KB)`;
        fileInfo.style.display = 'flex';
    } else {
        fileInfo.style.display = 'none';
    }
}

/**
 * Показва modal за замяна на файл
 */
function showReplaceModal(documentId, documentName) {
    const modal = document.getElementById('replaceModal');
    const form = document.getElementById('replaceForm');
    const nameSpan = document.getElementById('modalDocumentName');
    const fileInfo = document.getElementById('selectedFileName');

    // Задаваме името на документа
    nameSpan.textContent = documentName;

    // Задаваме action на формата
    form.action = '/documents/replace/' + documentId;

    // Скриваме информацията за избран файл
    fileInfo.style.display = 'none';

    // Показваме modal-а
    modal.style.display = 'flex';
}

/**
 * Скрива modal за замяна на файл
 */
function closeReplaceModal() {
    const modal = document.getElementById('replaceModal');
    const form = document.getElementById('replaceForm');

    modal.style.display = 'none';
    form.reset();
}

// Затваря modal при клик извън него
window.onclick = function(event) {
    const modal = document.getElementById('replaceModal');
    if (event.target === modal) {
        closeReplaceModal();
    }
}
</script>

</body>
</html>
