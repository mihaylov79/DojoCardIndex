<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Качване на документ</title>
    <link rel="stylesheet" th:href="@{/css/default-test.css}">
    <link rel="stylesheet" th:href="@{/css/upload-document-test.css}">
</head>
<body>
<header>
    <th:block th:insert="~{fragments/nav :: nav}"></th:block>
</header>

<div class="main-container">
    <div class="container-send">
        <h2>Качване на документ</h2>
        <span class="credentials-error"></span>

        <!-- Съобщения за грешки -->
        <span th:if="${errorMessage}" class="credentials-error" th:text="${errorMessage}"></span>

        <form th:action="@{/documents/upload}" th:method="POST" th:object="${createDocumentRequest}" enctype="multipart/form-data">

            <!-- Заглавие -->
            <div class="field">
                <label for="title">Заглавие:</label>
                <input type="text"
                       id="title"
                       name="title"
                       th:field="*{title}"
                       placeholder="Въведете заглавие на документа"
                       maxlength="100"
                       required>
                <span class="errors" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>

            <!-- Описание -->
            <div class="field">
                <label for="description">Описание:</label>
                <textarea id="description"
                          name="description"
                          th:field="*{description}"
                          placeholder="Кратко описание на документа (незадължително)"
                          maxlength="500"
                          rows="4"></textarea>
                <span class="errors" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>

            <!-- Категория -->
            <div class="field">
                <label for="category">Категория:</label>
                <select id="category"
                        name="category"
                        th:field="*{category}"
                        required>
                    <option value="">-- Изберете категория --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat.description}">
                    </option>
                </select>
                <span class="errors" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
            </div>

            <!-- Файл -->
            <div class="field">
                <label for="file">Файл:</label>
                <div class="file-input-container">
                    <input type="file"
                           id="file"
                           name="file"
                           accept=".pdf,.doc,.docx,.xls,.xlsx,.zip"
                           required
                           onchange="updateFileName(this)">
                    <span class="file-icon">📄</span>
                    <span class="file-name" id="fileName">Не е избран файл</span>
                </div>
                <small style="color: #666; font-size: 0.85em; display: block; margin-top: 0.3rem;">
                    Разрешени формати: PDF, DOC, DOCX, XLS, XLSX, ZIP (макс. 5MB)
                </small>
            </div>

            <button type="submit">Качи документа</button>

            <div class="back-link">
                <a href="/documents">Назад</a>
            </div>
        </form>
    </div>
</div>

<script>
function updateFileName(input) {
    const fileNameSpan = document.getElementById('fileName');
    if (input.files && input.files[0]) {
        fileNameSpan.textContent = input.files[0].name;
        fileNameSpan.style.color = '#000';
    } else {
        fileNameSpan.textContent = 'Не е избран файл';
        fileNameSpan.style.color = '#888';
    }
}
</script>

</body>
</html>
